<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>脉脉采集自动化桥</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 16px;
      color: #1f2937;
    }
    textarea, pre {
      box-sizing: border-box;
      width: 100%;
      min-height: 160px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      padding: 8px;
      font: 12px/1.5 ui-monospace, SFMono-Regular, Consolas, monospace;
    }
    button {
      margin: 8px 8px 8px 0;
      padding: 6px 10px;
    }
  </style>
</head>
<body>
  <h1>自动化桥</h1>
  <textarea id="automation-input" spellcheck="false" placeholder='{"type":"getFullExportData"}'></textarea>
  <div>
    <button id="automation-run">执行命令</button>
    <button id="automation-status">查看状态</button>
    <button id="automation-export">读取完整导出</button>
  </div>
  <pre id="automation-output">就绪</pre>
  <script src="automation.js"></script>
</body>
</html>
