<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="popup.css">
</head>
<body>
  <main class="launcher-shell">
    <header class="launcher-header">
      <div>
        <h3>脉脉人选数据采集</h3>
        <p id="status-line" class="status-line">正在读取状态...</p>
      </div>
      <span class="status-badge" id="status-badge">--</span>
    </header>

    <section class="summary" id="popup-summary" aria-label="采集摘要">
      <div class="summary-item">
        <span>请求</span>
        <b id="req-count">0</b>
      </div>
      <div class="summary-item">
        <span>人选</span>
        <b id="contact-count">0</b>
      </div>
      <div class="summary-item">
        <span>详情</span>
        <b id="detail-count">0</b>
      </div>
    </section>

    <div class="actions">
      <button id="btn-open-workbench" class="primary">打开工作台</button>
      <button id="btn-export-full">快速导出</button>
      <button id="btn-refresh">刷新</button>
    </div>
  </main>
  <script src="popup.js"></script>
</body>
</html>
